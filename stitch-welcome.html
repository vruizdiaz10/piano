<style>
        .clay-container {
            background: rgba(253, 251, 247, 0.85); /* sheet-cream slightly transparent */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 
                0 20px 40px -10px rgba(61, 31, 16, 0.15), /* Outer shadow */
                inset 1px 1px 2px rgba(255, 255, 255, 0.8), /* Inner highlight top-left */
                inset -1px -1px 3px rgba(133, 115, 109, 0.1); /* Inner shadow bottom-right */
            border: 1px solid rgba(232, 208, 155, 0.3); /* subtle brass outline */
        }
        
        .clay-btn-primary {
            background-color: #3D1F10; /* mahogany-dark */
            box-shadow: 
                0 10px 20px -5px rgba(61, 31, 16, 0.3),
                inset 1px 1px 2px rgba(232, 208, 155, 0.3), /* brass highlight */
                inset -2px -2px 4px rgba(0, 0, 0, 0.4);
            transition: all 0.2s ease;
        }
        
        .clay-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 15px 25px -5px rgba(61, 31, 16, 0.35),
                inset 1px 1px 2px rgba(232, 208, 155, 0.4),
                inset -2px -2px 4px rgba(0, 0, 0, 0.4);
        }
        
        .clay-btn-primary:active {
            transform: translateY(1px);
            box-shadow: 
                0 5px 10px -5px rgba(61, 31, 16, 0.2),
                inset 2px 2px 5px rgba(0, 0, 0, 0.5),
                inset -1px -1px 2px rgba(232, 208, 155, 0.1);
        }

        .clay-btn-secondary {
            background-color: #FDFBF7; /* sheet-cream */
            color: #3D1F10; /* mahogany-dark */
            box-shadow: 
                0 8px 15px -5px rgba(0, 0, 0, 0.08),
                inset 1px 1px 2px #ffffff,
                inset -2px -2px 4px rgba(133, 115, 109, 0.15);
            border: 1px solid rgba(232, 208, 155, 0.4);
            transition: all 0.2s ease;
        }

        .clay-btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 12px 20px -5px rgba(0, 0, 0, 0.1),
                inset 1px 1px 2px #ffffff,
                inset -2px -2px 4px rgba(133, 115, 109, 0.15);
        }

                0 4px 8px -5px rgba(0, 0, 0, 0.1),
                inset 2px 2px 4px rgba(133, 115, 109, 0.2),
                inset -1px -1px 2px #ffffff;
